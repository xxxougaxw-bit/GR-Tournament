<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>メンバー管理 | GR Tools</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="nav">
    <a href="index.html" class="nav-brand">GR TOOLS</a>
    <a href="members.html" class="nav-link active">メンバー</a>
    <a href="tournament.html" class="nav-link">トーナメント</a>
    <a href="templates.html" class="nav-link">テンプレート</a>
    <a href="https://docs.google.com/forms/d/1qW54A7iSw-CXLTHmUGSoD23Ur3grSP4EGgVKnswhTQs/viewform" class="nav-link" target="_blank">📝 フォーム</a>
    <a href="https://docs.google.com/spreadsheets/d/1gz32Wh_0UC8Fegc8amK8VYWKKw28FMQRQVli7CgBWf4/edit?resourcekey=&gid=1692161048#gid=1692161048" class="nav-link" target="_blank">📊 シート</a>
  </nav>

  <main>
    <div class="page-header">
      <h1>メンバー管理</h1>
      <button class="btn btn-primary" id="addBtn">+ 追加</button>
    </div>
    <div id="root"></div>
  </main>

  <!-- Add / Edit Modal -->
  <div class="overlay" id="overlay">
    <div class="modal">
      <div class="modal-title" id="modalTitle">メンバー追加</div>
      <div class="form-group">
        <label class="form-label">名前</label>
        <input type="text" class="form-input" id="nameInput" placeholder="例: たろう" autocomplete="off">
        <div class="form-hint">チーム内での呼び名・表示名</div>
      </div>
      <div class="form-group">
        <label class="form-label">Epic ID</label>
        <input type="text" class="form-input" id="epicIdInput" placeholder="例: GR_PlayerName" autocomplete="off">
        <div class="form-hint">UNITE連携後のDiscord表示名と同じもの</div>
      </div>
      <div class="form-group">
        <label class="form-label">Discord ID <span style="font-weight:400;opacity:0.6">（メンション用・任意）</span></label>
        <input type="text" class="form-input" id="discordIdInput" placeholder="例: 123456789012345678" autocomplete="off">
        <div class="form-hint">Discord → ユーザー名を右クリック → 「IDをコピー」で確認できます</div>
      </div>
      <div class="form-group">
        <label class="form-label">ロール <span style="font-weight:400;opacity:0.6">（任意）</span></label>
        <input type="text" class="form-input" id="roleInput" placeholder="例: IGL、リフレッシュ、など自由入力" list="roleList" autocomplete="off">
        <datalist id="roleList">
          <option value="IGL">
          <option value="リフレッシュ">
          <option value="フラッガー">
          <option value="サポート">
        </datalist>
      </div>
      <div class="form-group">
        <label class="form-label">メモ <span style="font-weight:400;opacity:0.6">（任意）</span></label>
        <textarea class="form-input" id="memoInput" placeholder="例: サブ選手、月2参加、連絡取りやすい" rows="3" style="resize:vertical"></textarea>
      </div>
      <div class="modal-footer">
        <button class="btn btn-outline" id="cancelBtn">キャンセル</button>
        <button class="btn btn-primary" id="saveBtn">保存</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script type="module" src="js/members.js"></script>
</body>
</html>
